name: Build & Push Metabase Terraform Runner

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/metabase-tf-runner.yml"
      - "metabase/tf/**"
      - "metabase/tf-runner/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Build Terraform provider mirror
        working-directory: metabase/tf
        run: |
          terraform providers mirror \
            -platform=linux_amd64 \
            provider-mirror

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates image tags from git context:
      #   push tag v1.2.3  -> image tagged "1.2.3", "1.2", and "latest"
      #   push to main     -> image tagged "main"
      #   manual trigger   -> image tagged with branch name
      #   any trigger      -> always also tagged "sha-31e1fa9" (short commit sha)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/autonox-ai/metabase-terraform
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: metabase
          file: metabase/tf-runner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
