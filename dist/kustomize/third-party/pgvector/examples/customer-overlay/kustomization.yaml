apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Customer-specific namespace goes here
namespace: autonox

resources:
  # Use the OpenShift overlay (works on vanilla too in many clusters).
  - ../../overlays/openshift
  - secret.pgvector-db.example.yaml

patches:
  # Set PVC size (default in base is 10Gi)
  - target:
      kind: StatefulSet
      name: pgvector
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi

  # Optional: set StorageClass explicitly (remove this patch if you want the cluster default)
  - target:
      kind: StatefulSet
      name: pgvector
    patch: |-
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: managed-csi
