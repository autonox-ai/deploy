apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
spec:
  serviceName: pgvector
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgvector

  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgvector
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgres
          # Image must include the pgvector extension.
          # Image tag is centrally pinned via Kustomize component:
          # dist/kustomize/shared/components/images
          image: pgvector/pgvector
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432
              name: postgres

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_PASSWORD

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true

          readinessProbe:
            exec:
              command: ["/bin/sh","-lc","pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          livenessProbe:
            exec:
              command: ["/bin/sh","-lc","pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

      volumes:
        - name: initdb
          configMap:
            name: pgvector-initdb

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # Customer SHOULD set storageClassName via their overlay (see examples/)
        # If omitted, the cluster default StorageClass is used.
        resources:
          requests:
            storage: 10Gi
