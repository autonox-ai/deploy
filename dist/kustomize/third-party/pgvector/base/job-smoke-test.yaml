apiVersion: batch/v1
kind: Job
metadata:
  name: pgvector-smoke-test
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgvector-smoke-test
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: test
        # Image must include psql client and match the Postgres major version.
        # Image tag is centrally pinned via Kustomize component:
        # dist/kustomize/shared/components/images
          image: pgvector/pgvector
          imagePullPolicy: IfNotPresent

          env:
            - name: PGHOST
              value: pgvector
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_DB
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-db
                  key: POSTGRES_PASSWORD

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          command:
            - /bin/sh
            - -lc
            - |
              set -euo pipefail
              echo "Checking DB connectivity..."
              psql -v ON_ERROR_STOP=1 -c "SELECT 1;"
              echo "Checking pgvector extension..."
              psql -v ON_ERROR_STOP=1 -c "SELECT extname FROM pg_extension WHERE extname='vector';"
              echo "OK"
