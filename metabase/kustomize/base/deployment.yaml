apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: metabase
          # Image tag is centrally pinned via Kustomize component:
          # metabase/kustomize/components/images
          image: metabase/metabase
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_HOST
            - name: MB_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_PORT
            - name: MB_DB_DBNAME
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_DBNAME
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_PASS

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
