apiVersion: v1
kind: Secret
metadata:
  name: metabase-db
type: Opaque
stringData:
  # Connection that Metabase uses for its OWN metadata store.
  # This database/user must be provisioned separately — see metabase/bootstrap/.
  MB_DB_HOST: pgvector
  MB_DB_PORT: "5432"
  MB_DB_DBNAME: metabase
  MB_DB_USER: metabase_user
  MB_DB_PASS: change-me
